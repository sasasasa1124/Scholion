name: Claude Issue Agent

on:
  issues:
    types: [opened]
  repository_dispatch:
    types: [process-issue]

jobs:
  claude-agent:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Edit,MultiEdit,Glob,Grep,LS,Read,Write,mcp__github_comment__update_claude_comment,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git rm:*),Bash(git checkout:*),Bash(gh issue view:*),Bash(gh pr create:*),Bash(npm run:*),Bash(npm install:*),Bash(npx:*)"
          direct_prompt: |
            Please implement the following GitHub issue:

            Issue number: ${{ github.event.issue.number || github.event.client_payload.issue_number }}

            The issue context is already provided above — read it carefully.
            You are already on the correct working branch. Do NOT create a new branch.

            Follow these steps:
            1. Analyze the issue and form a clear implementation plan
            2. Implement the required changes (application code lives under quiz/)
            3. Run `cd quiz && npm install && npm run build` to verify the build passes
            4. Commit with a descriptive English/ASCII-only commit message
            5. Push the branch and open a pull request whose body includes exactly "Closes #${{ github.event.issue.number || github.event.client_payload.issue_number }}"

            Project guidelines:
            - Follow CLAUDE.md in the repo root and quiz/CLAUDE.md
            - Keep commit messages in English/ASCII only (Cloudflare Pages requirement)
